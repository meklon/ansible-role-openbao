---
# handlers file for openbao

- name: Restart OpenBao
  ansible.builtin.systemd:
    name: openbao
    state: restarted
    daemon_reload: true

- name: Reload OpenBao
  ansible.builtin.systemd:
    name: openbao
    state: reloaded
    daemon_reload: true

- name: Restart OpenBao Agent
  ansible.builtin.systemd:
    name: openbao-agent
    state: restarted
    daemon_reload: true
