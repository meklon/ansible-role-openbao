---
argument_specs:
  main:
    short_description: "Install OpenBao package on your system."
    description: >
      Install OpenBao package on your system.
    author: Robert de Bock
    options:
      openbao_version:
        type: "str"
        required: false
        default: "2.5.0"
        description: "Package version of OpenBao to install (e.g., '2.5.0'). The role will request this version from the configured package repository."
      openbao_download_dir:
        type: "str"
        default: "/tmp"
        description: "Directory to store temporary downloaded artifacts (for example, plugin archives)."
      openbao_validate_certs:
        type: "bool"
        required: false
        default: false
        description: "Whether to validate TLS certificates when downloading the OpenBao GPG key. When false, TLS errors are ignored (insecure; use only in controlled environments)."
